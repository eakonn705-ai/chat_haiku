<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反学友会 掲示板！</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:          #e8e4dc;
  --ink-sub:      #a09890;
  --gold:         #c9a96e;
  --gold-dim:     rgba(201,169,110,.18);
  --glass-bg:     rgba(12,10,8,.55);
  --glass-border: rgba(201,169,110,.22);
  --blur:         blur(18px) saturate(160%);
  --radius:       14px;
  --font-serif:   'Noto Serif JP', serif;
  --font-mono:    'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-serif);
  color: var(--ink);
  min-height: 100vh;
  background: #0a0806 url('back.png') center/cover fixed no-repeat;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: linear-gradient(160deg,rgba(8,6,4,.72) 0%,rgba(14,10,6,.58) 50%,rgba(6,4,2,.78) 100%);
  pointer-events: none;
  z-index: 0;
}

/* ===== PASSCODE OVERLAY ===== */
#passcode-overlay {
  position: fixed; inset: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  background: rgba(4,3,2,.88);
  backdrop-filter: blur(24px) saturate(120%);
  -webkit-backdrop-filter: blur(24px) saturate(120%);
  transition: opacity .5s, visibility .5s;
}
#passcode-overlay.hidden {
  opacity: 0; visibility: hidden; pointer-events: none;
}

.passcode-box {
  background: rgba(14,11,8,.75);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 2.8rem 2.4rem 2.4rem;
  width: min(380px, 90vw);
  text-align: center;
  animation: scaleIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes scaleIn {
  from { opacity:0; transform:scale(.88); }
  to   { opacity:1; transform:scale(1); }
}

.passcode-logo {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: .06em;
  margin-bottom: .35rem;
}
.passcode-logo span { color: var(--ink-sub); font-weight: 400; }

.passcode-tagline {
  font-size: .72rem;
  color: var(--ink-sub);
  letter-spacing: .14em;
  font-family: var(--font-mono);
  margin-bottom: 2.2rem;
  opacity: .7;
}

/* パスワード入力欄 */
.passcode-input-wrap {
  position: relative;
  margin-bottom: 1.2rem;
}
#passcode-input {
  width: 100%;
  background: rgba(255,255,255,.05);
  border: 1.5px solid rgba(201,169,110,.25);
  border-radius: 10px;
  padding: .8rem 3rem .8rem 1rem;
  font-family: var(--font-mono);
  font-size: 1.1rem;
  letter-spacing: .18em;
  color: var(--ink);
  text-align: center;
  outline: none;
  transition: border-color .2s, background .2s, box-shadow .2s;
  caret-color: var(--gold);
}
#passcode-input::placeholder { letter-spacing: .06em; color: rgba(160,152,144,.4); font-size: .85rem; }
#passcode-input:focus {
  border-color: var(--gold);
  background: rgba(201,169,110,.06);
  box-shadow: 0 0 0 3px rgba(201,169,110,.1);
}
#passcode-input.error {
  border-color: #c0392b;
  background: rgba(192,57,43,.08);
  box-shadow: 0 0 0 3px rgba(192,57,43,.12);
  animation: shake .35s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-6px);}
  40%{transform:translateX(6px);}
  60%{transform:translateX(-4px);}
  80%{transform:translateX(4px);}
}

/* 表示/非表示トグルボタン */
#toggle-visibility {
  position: absolute; right: .75rem; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--ink-sub); cursor: pointer;
  font-size: .9rem; padding: .2rem;
  transition: color .2s;
  line-height: 1;
}
#toggle-visibility:hover { color: var(--gold); }

.passcode-submit {
  width: 100%;
  padding: .75rem;
  background: linear-gradient(135deg,#c9a96e 0%,#a07840 100%);
  border: none; border-radius: 10px;
  font-family: var(--font-mono);
  font-size: .88rem; font-weight: 600;
  letter-spacing: .08em;
  color: #0a0806;
  cursor: pointer;
  transition: box-shadow .2s, transform .1s;
  box-shadow: 0 2px 16px rgba(201,169,110,.25);
}
.passcode-submit:hover  { box-shadow: 0 4px 24px rgba(201,169,110,.4); }
.passcode-submit:active { transform: scale(.97); }

.passcode-error-msg {
  font-family: var(--font-mono);
  font-size: .7rem;
  color: #e87070;
  letter-spacing: .06em;
  margin-top: .65rem;
  min-height: 1em;
  transition: opacity .2s;
}

.passcode-hint {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--ink-sub);
  letter-spacing: .08em;
  opacity: .45;
  margin-top: .9rem;
}

/* ===== HEADER ===== */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,6,4,.72);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
  height: 60px;
  display: flex; align-items: center;
  padding: 0 1.5rem; gap: 1rem;
}
.site-logo {
  font-family: var(--font-mono);
  font-size: 1.15rem; font-weight: 600;
  color: var(--gold); letter-spacing: .04em;
  cursor: pointer; user-select: none; flex: 1;
}
.site-logo span { color: var(--ink-sub); font-weight: 400; }

#back-btn {
  display: none; align-items: center; gap: .4rem;
  background: var(--gold-dim);
  border: 1px solid var(--glass-border);
  color: var(--gold); padding: .35rem .85rem;
  border-radius: 20px; cursor: pointer;
  font-family: var(--font-mono); font-size: .78rem;
  letter-spacing: .05em;
  transition: background .2s, border-color .2s;
}
#back-btn:hover { background: rgba(201,169,110,.3); border-color: var(--gold); }
#back-btn.visible { display: flex; }

.header-kigo {
  font-size: .7rem; color: var(--ink-sub);
  letter-spacing: .12em; font-family: var(--font-mono); opacity: .6;
}

/* ===== MAIN ===== */
main {
  position: relative; z-index: 1;
  max-width: 740px; margin: 0 auto;
  padding: 2rem 1rem 6rem;
}

/* ===== CARD ===== */
.card {
  background: var(--glass-bg);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem; margin-bottom: 1rem;
}
.card-eyebrow {
  font-family: var(--font-mono); font-size: .68rem;
  color: var(--gold); letter-spacing: .14em;
  text-transform: uppercase; margin-bottom: 1rem;
  display: flex; align-items: center; gap: .5rem;
}
.card-eyebrow::after {
  content: ''; flex: 1; height: 1px;
  background: linear-gradient(to right, var(--glass-border), transparent);
}

/* ===== FORM ===== */
.form-group { margin-bottom: .9rem; }
label {
  display: block; font-size: .72rem; color: var(--ink-sub);
  letter-spacing: .08em; margin-bottom: .4rem;
  font-family: var(--font-mono);
}
input[type="text"], textarea {
  width: 100%; background: rgba(255,255,255,.04);
  border: 1px solid rgba(201,169,110,.2); border-radius: 8px;
  padding: .65rem .9rem; font-size: .9rem;
  font-family: var(--font-serif); color: var(--ink);
  transition: border-color .2s, background .2s; outline: none;
}
input[type="text"]::placeholder, textarea::placeholder { color: rgba(160,152,144,.5); }
input[type="text"]:focus, textarea:focus {
  border-color: var(--gold); background: rgba(201,169,110,.06);
}
textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

/* ===== BUTTONS ===== */
.btn {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: .6rem 1.3rem; border: none; border-radius: 8px;
  cursor: pointer; font-family: var(--font-mono);
  font-size: .82rem; font-weight: 600; letter-spacing: .05em;
  transition: opacity .2s, transform .1s, box-shadow .2s;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-gold {
  background: linear-gradient(135deg,#c9a96e 0%,#a07840 100%);
  color: #0a0806; box-shadow: 0 2px 16px rgba(201,169,110,.25);
}
.btn-gold:hover:not(:disabled) { box-shadow: 0 4px 24px rgba(201,169,110,.4); }

/* ===== THREAD LIST ===== */
#thread-list { list-style: none; display: flex; flex-direction: column; gap: .55rem; }
.thread-item {
  background: var(--glass-bg);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  overflow: hidden; cursor: pointer;
  transition: border-color .2s, transform .15s, box-shadow .2s;
}
.thread-item:hover {
  border-color: rgba(201,169,110,.5);
  transform: translateX(4px); box-shadow: -4px 0 20px rgba(201,169,110,.12);
}
.thread-link { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.2rem; }
.thread-num {
  font-family: var(--font-mono); font-size: .65rem;
  color: var(--gold); opacity: .6; min-width: 2em; text-align: right;
}
.thread-body { flex: 1; min-width: 0; }
.thread-title {
  font-size: .95rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px;
}
.thread-date { font-family: var(--font-mono); font-size: .68rem; color: var(--ink-sub); }
.thread-arrow {
  color: var(--gold); opacity: .5; font-size: 1.1rem;
  transition: opacity .2s, transform .2s;
}
.thread-item:hover .thread-arrow { opacity: 1; transform: translateX(3px); }

/* ===== THREAD HEADER ===== */
#thread-header-card { border-left: 3px solid var(--gold); padding-left: 1.4rem; }
#thread-header-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .3rem; line-height: 1.5; }
#thread-header-date { font-family: var(--font-mono); font-size: .7rem; color: var(--ink-sub); }

/* ===== POST LIST ===== */
#post-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }
.post-item {
  background: var(--glass-bg);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border); border-radius: var(--radius);
  padding: 1rem 1.25rem;
  animation: fadeUp .3s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.post-header {
  display: flex; align-items: baseline; gap: .6rem;
  margin-bottom: .6rem; flex-wrap: wrap;
}
.post-num  { font-family: var(--font-mono); font-size: .65rem; color: var(--gold); opacity: .7; min-width: 2.2em; }
.post-name { font-family: var(--font-mono); font-size: .8rem; font-weight: 600; color: var(--gold); }
.post-time { font-family: var(--font-mono); font-size: .65rem; color: var(--ink-sub); margin-left: auto; }
.post-body { font-size: .92rem; line-height: 1.8; white-space: pre-wrap; word-break: break-word; }

/* ===== STAMP ===== */
.stamp-tray {
  display: flex; flex-wrap: wrap; gap: .5rem;
  margin-top: .6rem; padding-top: .6rem;
  border-top: 1px solid var(--glass-border);
}
.stamp-btn {
  background: rgba(201,169,110,.08);
  border: 1px solid rgba(201,169,110,.22);
  border-radius: 10px; cursor: pointer;
  font-size: 1.8rem; line-height: 1;
  padding: .3rem .55rem;
  transition: background .18s, transform .12s, border-color .18s;
  user-select: none;
}
.stamp-btn:hover  { background: rgba(201,169,110,.22); border-color: var(--gold); transform: scale(1.12); }
.stamp-btn:active { transform: scale(.94); }

/* スタンプ表示（投稿本文内） */
.post-stamp {
  font-size: 3.2rem; line-height: 1.2;
  display: block; text-align: left;
  margin: .15rem 0;
  user-select: none;
}

/* ===== REPLY ===== */
.reply-quote {
  background: rgba(201,169,110,.07);
  border-left: 3px solid var(--gold);
  border-radius: 0 6px 6px 0;
  padding: .4rem .75rem;
  margin-bottom: .55rem;
  font-size: .78rem;
  color: var(--ink-sub);
  font-family: var(--font-mono);
  cursor: pointer;
  transition: background .18s;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 100%;
}
.reply-quote:hover { background: rgba(201,169,110,.14); }
.reply-quote .reply-from { color: var(--gold); font-size: .7rem; margin-bottom: .15rem; display: block; }

/* 返信ターゲットバナー（入力エリア上部） */
#reply-banner {
  display: none;
  align-items: center; gap: .6rem;
  background: rgba(201,169,110,.08);
  border: 1px solid rgba(201,169,110,.25);
  border-radius: 8px; padding: .5rem .85rem;
  margin-bottom: .7rem;
  font-family: var(--font-mono); font-size: .75rem; color: var(--ink-sub);
}
#reply-banner.active { display: flex; }
#reply-banner .reply-preview { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#reply-banner .reply-cancel {
  background: none; border: none; color: var(--ink-sub); cursor: pointer;
  font-size: .85rem; padding: .1rem .3rem;
  transition: color .18s;
  flex-shrink: 0;
}
#reply-banner .reply-cancel:hover { color: #e87070; }

/* 返信ボタン（各投稿） */
.post-reply-btn {
  background: none; border: none;
  color: var(--ink-sub); font-family: var(--font-mono);
  font-size: .68rem; letter-spacing: .05em;
  cursor: pointer; padding: .2rem .5rem;
  border-radius: 5px;
  transition: color .18s, background .18s;
  margin-top: .4rem;
  opacity: 0;
  transition: opacity .18s, color .18s, background .18s;
}
.post-item:hover .post-reply-btn { opacity: 1; }
.post-reply-btn:hover { color: var(--gold); background: var(--gold-dim); }

/* ===== 組織AI リンクボタン ===== */
#org-ai-btn {
  display: flex;
  align-items: center;
  gap: 1rem;
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 1rem;
  padding: 1.15rem 1.4rem;
  border-radius: 14px;
  text-decoration: none;
  color: inherit;
  position: relative;
  overflow: hidden;
  cursor: pointer;

  /* ガラスモーフィズム + ゴールドグラデ枠 */
  background: linear-gradient(
    135deg,
    rgba(201,169,110,.13) 0%,
    rgba(120,90,40,.07) 50%,
    rgba(201,169,110,.10) 100%
  );
  border: 1px solid transparent;
  background-clip: padding-box;
  box-shadow:
    0 0 0 1px rgba(201,169,110,.35),
    0 4px 24px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.05);

  transition: transform .22s cubic-bezier(.34,1.56,.64,1),
              box-shadow .22s ease,
              background .22s ease;
}

#org-ai-btn::before {
  content: "";
  position: absolute; inset: 0;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(201,169,110,.06) 50%,
    transparent 100%
  );
  transform: translateX(-100%);
  transition: transform .6s ease;
}
#org-ai-btn:hover::before { transform: translateX(100%); }

#org-ai-btn:hover {
  transform: translateY(-2px) scale(1.01);
  box-shadow:
    0 0 0 1px rgba(201,169,110,.6),
    0 8px 32px rgba(201,169,110,.18),
    0 2px 8px rgba(0,0,0,.4),
    inset 0 1px 0 rgba(255,255,255,.08);
}
#org-ai-btn:active {
  transform: translateY(0) scale(.985);
  transition-duration: .08s;
}

/* グロー（背景の光） */
.org-ai-glow {
  position: absolute;
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(201,169,110,.18) 0%, transparent 70%);
  left: -20px; top: 50%; transform: translateY(-50%);
  pointer-events: none;
}

/* アイコン */
.org-ai-icon {
  font-size: 2rem;
  line-height: 1;
  filter: drop-shadow(0 0 6px rgba(201,169,110,.5));
  flex-shrink: 0;
  z-index: 1;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1);
}
#org-ai-btn:hover .org-ai-icon { transform: rotate(-8deg) scale(1.12); }

/* テキスト */
.org-ai-label {
  display: flex;
  flex-direction: column;
  gap: .15rem;
  flex: 1;
  z-index: 1;
}
.org-ai-sub {
  font-family: var(--font-mono);
  font-size: .6rem;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--gold);
  opacity: .7;
}
.org-ai-main {
  font-family: var(--font-serif, serif);
  font-size: 1.15rem;
  font-weight: 600;
  letter-spacing: .06em;
  color: #f0e6cc;
  text-shadow: 0 0 12px rgba(201,169,110,.4);
}

/* 矢印 */
.org-ai-arrow {
  font-family: var(--font-mono);
  font-size: 1.1rem;
  color: var(--gold);
  opacity: .7;
  z-index: 1;
  transition: transform .22s ease, opacity .22s ease;
  flex-shrink: 0;
}
#org-ai-btn:hover .org-ai-arrow { transform: translateX(5px); opacity: 1; }

/* ===== STATES ===== */
.state-msg {
  text-align: center; padding: 3rem 1rem;
  color: var(--ink-sub); font-size: .85rem;
  font-family: var(--font-mono); letter-spacing: .06em;
}
.spinner {
  display: inline-block; width: 22px; height: 22px;
  border: 2px solid rgba(201,169,110,.2); border-top-color: var(--gold);
  border-radius: 50%; animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: .5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== DIVIDER ===== */
.divider {
  display: flex; align-items: center; gap: .8rem;
  margin: 1.2rem 0; font-family: var(--font-mono);
  font-size: .62rem; color: var(--ink-sub);
  letter-spacing: .1em; opacity: .5;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--glass-border);
}

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(14,10,6,.92);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  color: var(--ink); padding: .65rem 1.4rem;
  border-radius: 24px; font-family: var(--font-mono);
  font-size: .78rem; letter-spacing: .06em;
  opacity: 0; transition: opacity .3s, transform .3s;
  pointer-events: none; z-index: 999;
  max-width: 90vw; text-align: center;
}
.toast.show    { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error   { border-color: rgba(192,57,43,.5); color: #e87070; }
.toast.success { border-color: rgba(201,169,110,.5); color: var(--gold); }

/* ===== AUTO-UPDATE INDICATOR ===== */
#update-indicator {
  display: flex; align-items: center; gap: .4rem;
  font-family: var(--font-mono); font-size: .65rem;
  color: var(--ink-sub); letter-spacing: .06em;
  opacity: .55; transition: opacity .3s, color .3s;
  white-space: nowrap;
}
#update-indicator.syncing { opacity: 1; color: var(--gold); }
#update-indicator.updated { opacity: 1; color: #5dbe7a; }
.pulse-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: currentColor; flex-shrink: 0;
}
#update-indicator.syncing .pulse-dot {
  animation: pulse-anim .8s ease-in-out infinite;
}
@keyframes pulse-anim {
  0%,100% { opacity:.3; transform:scale(.8); }
  50%     { opacity:1;  transform:scale(1.2); }
}

@media (max-width: 480px) {
  main { padding: 1.2rem .6rem 5rem; }
  .card { padding: 1.1rem 1rem; }
  header { padding: 0 1rem; }
  .passcode-box { padding: 2.2rem 1.4rem 1.8rem; }
  #update-indicator .label { display: none; }
}
</style>
</head>
<body>

<!-- ========== パスコードオーバーレイ ========== -->
<div id="passcode-overlay">
  <div class="passcode-box">
    <div class="passcode-logo">反学友会 掲示板！<span> //</span></div>
    <div class="passcode-tagline">ENTER PASSWORD</div>

    <div class="passcode-input-wrap">
      <input type="password" id="passcode-input"
             placeholder="パスワードを入力"
             autocomplete="current-password"
             onkeydown="if(event.key==='Enter')checkPasscode()">
      <button id="toggle-visibility" onclick="togglePasscodeVisibility()" tabindex="-1">👁</button>
    </div>

    <button class="passcode-submit" onclick="checkPasscode()">ENTER →</button>

    <div class="passcode-error-msg" id="passcode-error"></div>
    <div class="passcode-hint">パスワードは大文字・小文字を区別します</div>
  </div>
</div>

<!-- ========== Header ========== -->
<header>
  <button id="back-btn" onclick="showView('threads')">← INDEX</button>
  <div class="site-logo" onclick="showView('threads')">反学友会 掲示板！<span> //</span></div>
  <div id="update-indicator" title="自動更新">
    <div class="pulse-dot"></div>
    <span class="label">LIVE</span>
  </div>
  <div class="header-kigo">千差万別</div>
</header>

<main>
  <!-- スレッド一覧ビュー -->
  <div id="view-threads">

    <!-- ========== 組織AI リンクボタン ========== -->
    <!-- ↓↓↓ 外部リンクURLをここに貼るだけでOK ↓↓↓ -->
    <script>const ORG_AI_URL = "https://gemini.google.com/gem/c3eb0ddb7964";</script>
    <!-- ↑↑↑ ここだけ変更すればOK ↑↑↑ -->

    <a id="org-ai-btn" href="#" target="_blank" rel="noopener noreferrer"
       onclick="event.preventDefault(); window.open(ORG_AI_URL,'_blank','noopener,noreferrer')">

    <div class="card" style="margin-top:1.2rem">
      <div class="card-eyebrow">WRITE</div>
      <div class="form-group">

      <!-- 返信バナー -->

      <!-- スタンプトレイ -->

        <button class="stamp-btn" onclick="sendStamp('stamp_1')" title="stamp_1">😊</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_2')" title="stamp_2">😂</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_3')" title="stamp_3">👍</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_4')" title="stamp_4">❤️</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_5')" title="stamp_5">🔥</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_6')" title="stamp_6">✨</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_7')" title="stamp_7">😢</button>
        <button class="stamp-btn" onclick="sendStamp('stamp_8')" title="stamp_8">🎉</button>
      </div>

      <button class="btn btn-gold" id="submit-post-btn" onclick="submitPost()">
        書き込む →
      </button>

</main>

<div id="toast" class="toast"></div>

<script>
// ============================================================
//  ★ 設定：ここを書き換えてください
// ============================================================
const GAS_URL  = "https://script.google.com/macros/s/AKfycbw5i-9heXNKSEuLk_Jt59mppYc1DT5YWa9aWyo9Ah3W-RkGoRjH73DHbZi0LGPiyjI/exec";   // GAS WebアプリのURL
const PASSCODE = "KasaneTeto";           // ← パスワードをここで設定（数字・文字・記号なんでもOK）

// 自動更新の間隔（ミリ秒）
const POLL_THREADS_MS = 10000;  // スレッド一覧：60秒ごと
const POLL_POSTS_MS   = 10000;  // 投稿一覧：60秒ごと

// ============================================================
//  パスコード認証
// ============================================================
const SESSION_KEY = "ch_auth";

function isAuthenticated() {
  return sessionStorage.getItem(SESSION_KEY) === "ok";
}

function togglePasscodeVisibility() {
  const inp = document.getElementById("passcode-input");
  const btn = document.getElementById("toggle-visibility");
  if (inp.type === "password") { inp.type = "text";     btn.textContent = "🙈"; }
  else                         { inp.type = "password"; btn.textContent = "👁"; }
}

function checkPasscode() {
  const inp   = document.getElementById("passcode-input");
  const errEl = document.getElementById("passcode-error");
  const val   = inp.value;
  if (!val) { errEl.textContent = "パスワードを入力してください"; inp.focus(); return; }
  if (val === PASSCODE) {
    sessionStorage.setItem(SESSION_KEY, "ok");
    document.getElementById("passcode-overlay").classList.add("hidden");
    initRoute();
  } else {
    inp.classList.add("error");
    errEl.textContent = "パスワードが違います";
    setTimeout(() => { inp.classList.remove("error"); inp.value = ""; inp.focus(); }, 600);
  }
}

window.addEventListener("load", () => {
  if (!isAuthenticated()) {
    setTimeout(() => document.getElementById("passcode-input").focus(), 100);
  }
});

// ============================================================
//  XSSエスケープ
// ============================================================
function esc(str) {
  return String(str ?? "")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

// ============================================================
//  スタンプ定義
// ============================================================
const STAMP_MAP = {
  stamp_1: "😊",
  stamp_2: "😂",
  stamp_3: "👍",
  stamp_4: "❤️",
  stamp_5: "🔥",
  stamp_6: "✨",
  stamp_7: "😢",
  stamp_8: "🎉",
};

// stamp_X → 対応絵文字（なければそのまま返す）
function resolveStamp(text) {
  return STAMP_MAP[text.trim()] || null;
}

// 投稿本文をHTMLに変換（スタンプ・返信プレフィックス対応）
function renderPostContent(content) {
  const replyPrefix = "[[reply:";
  let replyHtml = "";
  let body = content;

  // 返信プレフィックスを抽出
  if (body.startsWith(replyPrefix)) {
    const endIdx = body.indexOf("]]");
    if (endIdx !== -1) {
      const meta = body.slice(replyPrefix.length, endIdx); // "postNum:name:excerpt"
      const parts = meta.split(":", 3);
      const refNum  = parts[0] || "";
      const refName = parts[1] || "";
      const excerpt = parts[2] || "";
      replyHtml = `<div class="reply-quote" onclick="scrollToPost(${esc(refNum)})">
        <span class="reply-from">↩ &gt;&gt;${esc(refNum)} ${esc(refName)}</span>
        ${esc(excerpt)}
      </div>`;
      body = body.slice(endIdx + 2).trimStart();
    }
  }

  // スタンプ判定（本文がstamp_Xのみ）
  const stamp = resolveStamp(body);
  const bodyHtml = stamp
    ? `<span class="post-stamp">${stamp}</span>`
    : `<span>${esc(body)}</span>`;

  return replyHtml + bodyHtml;
}

// ============================================================
//  返信状態管理
// ============================================================
let replyTarget = null; // { num, name, excerpt }

function setReply(num, name, excerpt) {
  replyTarget = { num, name, excerpt };
  const banner  = document.getElementById("reply-banner");
  const preview = document.getElementById("reply-preview-text");
  preview.textContent = `>>>${num} ${name}：${excerpt}`;
  banner.classList.add("active");
  document.getElementById("post-content").focus();
}

function cancelReply() {
  replyTarget = null;
  document.getElementById("reply-banner").classList.remove("active");
}

function scrollToPost(num) {
  const items = document.querySelectorAll(".post-item");
  const target = items[num - 1];
  if (target) target.scrollIntoView({ behavior: "smooth", block: "center" });
}

// ============================================================
//  Toast
// ============================================================
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

// ============================================================
//  自動更新インジケーター
// ============================================================
function setIndicator(state) {
  // state: "idle" | "syncing" | "updated"
  const el = document.getElementById("update-indicator");
  el.className = state === "idle" ? "" : state;
  const label = el.querySelector(".label");
  if (label) label.textContent = state === "syncing" ? "SYNC" : "LIVE";
  if (state === "updated") setTimeout(() => setIndicator("idle"), 1500);
}

// ============================================================
//  ポーリング管理
// ============================================================
let pollTimer = null;

function stopPolling() {
  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
}

function startPollingThreads() {
  stopPolling();
  pollTimer = setInterval(async () => {
    setIndicator("syncing");
    const changed = await refreshThreads();
    setIndicator(changed ? "updated" : "idle");
  }, POLL_THREADS_MS);
}

function startPollingPosts() {
  stopPolling();
  pollTimer = setInterval(async () => {
    setIndicator("syncing");
    const changed = await refreshPosts();
    setIndicator(changed ? "updated" : "idle");
  }, POLL_POSTS_MS);
}

// ============================================================
//  ビュー切り替え
// ============================================================
function showView(view) {
  document.getElementById("view-threads").style.display = view === "threads" ? "" : "none";
  document.getElementById("view-posts").style.display   = view === "posts"   ? "" : "none";
  const btn = document.getElementById("back-btn");
  view === "posts" ? btn.classList.add("visible") : btn.classList.remove("visible");
  if (view === "threads") {
    currentThreadId = null;
    history.pushState({}, "", location.pathname);
    loadThreads();
    startPollingThreads();
  }
}

// ============================================================
//  初期ルーティング
// ============================================================
let currentThreadId = null;

function initRoute() {
  const tid = new URLSearchParams(location.search).get("thread_id");
  if (tid) openThread({ id: tid, title: "読み込み中…", created_at: "" });
  else     { loadThreads(); startPollingThreads(); }
}

// ============================================================
//  GAS通信
// ============================================================
async function gasGet(params) {
  const url = new URL(GAS_URL);
  Object.entries(params).forEach(([k,v]) => url.searchParams.set(k,v));
  return (await fetch(url.toString(), { redirect: "follow" })).json();
}
async function gasPost(body) {
  return (await fetch(GAS_URL, {
    method: "POST", redirect: "follow",
    headers: { "Content-Type": "text/plain" },
    body: JSON.stringify(body),
  })).json();
}

// ============================================================
//  スレッド一覧（初回ロード）
// ============================================================
let lastThreadsHash = "";

async function loadThreads() {
  const stateEl = document.getElementById("thread-list-state");
  const listEl  = document.getElementById("thread-list");
  listEl.innerHTML = "";
  stateEl.innerHTML = `<div class="state-msg"><span class="spinner"></span>loading…</div>`;
  try {
    const data = await gasGet({});
    stateEl.innerHTML = "";
    if (!data.ok) throw new Error(data.error);
    lastThreadsHash = JSON.stringify(data.threads);
    renderThreads(data.threads || []);
  } catch(e) {
    stateEl.innerHTML = `<div class="state-msg">⚠ ${esc(e.message)}</div>`;
  }
}

// ポーリング用（差分があるときだけ再描画、true=更新あり）
async function refreshThreads() {
  try {
    const data = await gasGet({});
    if (!data.ok) return false;
    const hash = JSON.stringify(data.threads);
    if (hash === lastThreadsHash) return false;
    lastThreadsHash = hash;
    renderThreads(data.threads || []);
    return true;
  } catch { return false; }
}

function renderThreads(threads) {
  const stateEl = document.getElementById("thread-list-state");
  const listEl  = document.getElementById("thread-list");
  if (!threads.length) {
    listEl.innerHTML = "";
    stateEl.innerHTML = `<div class="state-msg">— スレッドがまだありません —<br>最初のスレッドを立てましょう</div>`;
    return;
  }
  stateEl.innerHTML = "";
  listEl.innerHTML = threads.map((t,i) => `
    <li class="thread-item" onclick='openThread(${JSON.stringify(t).replace(/'/g,"\\'")})'> 
      <div class="thread-link">
        <div class="thread-num">${String(i+1).padStart(2,"0")}</div>
        <div class="thread-body">
          <div class="thread-title">${esc(t.title)}</div>
          <div class="thread-date">${esc(t.created_at)}</div>
        </div>
        <div class="thread-arrow">›</div>
      </div>
    </li>`).join("");
}

// ============================================================
//  スレッド作成
// ============================================================
async function createThread() {
  const titleEl = document.getElementById("new-thread-title");
  const btn     = document.getElementById("create-thread-btn");
  const title   = titleEl.value.trim();
  if (!title) { showToast("タイトルを入力してください","error"); return; }
  btn.disabled = true; btn.textContent = "作成中…";
  try {
    const data = await gasPost({ action:"create_thread", title });
    if (!data.ok) throw new Error(data.error);
    titleEl.value = "";
    showToast("スレッドを作成しました","success");
    lastThreadsHash = ""; // 強制再描画
    await loadThreads();
  } catch(e) {
    showToast(e.message,"error");
  } finally {
    btn.disabled = false; btn.textContent = "＋ スレッドを立てる";
  }
}

// ============================================================
//  スレッドを開く
// ============================================================
function openThread(thread) {
  currentThreadId = thread.id;
  document.getElementById("thread-header-title").textContent = thread.title;
  document.getElementById("thread-header-date").textContent  =
    thread.created_at ? `作成日時：${thread.created_at}` : "";
  history.pushState({}, "", `?thread_id=${encodeURIComponent(thread.id)}`);
  showView("posts");
  loadPosts();
  startPollingPosts();
}

// ============================================================
//  投稿一覧（初回ロード）
// ============================================================
let lastPostsHash = "";

async function loadPosts() {
  const stateEl = document.getElementById("post-list-state");
  const listEl  = document.getElementById("post-list");
  listEl.innerHTML = "";
  stateEl.innerHTML = `<div class="state-msg"><span class="spinner"></span>loading…</div>`;
  try {
    const data = await gasGet({ action:"get_posts", thread_id:currentThreadId });
    stateEl.innerHTML = "";
    if (!data.ok) throw new Error(data.error);
    lastPostsHash = JSON.stringify(data.posts);
    renderPosts(data.posts || []);
  } catch(e) {
    stateEl.innerHTML = `<div class="state-msg">⚠ ${esc(e.message)}</div>`;
  }
}

// ポーリング用（差分があるときだけ再描画）
async function refreshPosts() {
  if (!currentThreadId) return false;
  try {
    const data = await gasGet({ action:"get_posts", thread_id:currentThreadId });
    if (!data.ok) return false;
    const hash = JSON.stringify(data.posts);
    if (hash === lastPostsHash) return false;
    lastPostsHash = hash;
    renderPosts(data.posts || [], true); // true = 新着のみアニメ
    return true;
  } catch { return false; }
}

function makePostHtml(p, i) {
  const num  = i + 1;
  const name = p.name || "名無しさん";
  // 返信ボタン用のexcerpt（本文の最初の30文字、返信プレフィックス除去）
  let bodyForExcerpt = p.content || "";
  if (bodyForExcerpt.startsWith("[[reply:")) {
    const end = bodyForExcerpt.indexOf("]]");
    if (end !== -1) bodyForExcerpt = bodyForExcerpt.slice(end + 2).trimStart();
  }
  const excerpt = bodyForExcerpt.slice(0, 30).replace(/\n/g, " ") + (bodyForExcerpt.length > 30 ? "…" : "");
  // onclick の文字列エスケープ
  const nameJs    = name.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
  const excerptJs = excerpt.replace(/\\/g,"\\\\").replace(/'/g,"\\'");

  return `
    <li class="post-item" style="animation-delay:${i*40}ms">
      <div class="post-header">
        <span class="post-num">${String(num).padStart(2,"0")}</span>
        <span class="post-name">${esc(name)}</span>
        <span class="post-time">${esc(p.timestamp)}</span>
      </div>
      <div class="post-body">${renderPostContent(p.content || "")}</div>
      <button class="post-reply-btn" onclick="setReply(${num},'${nameJs}','${excerptJs}')">↩ 返信</button>
    </li>`;
}

function renderPosts(posts, onlyNewAnim = false) {
  const stateEl   = document.getElementById("post-list-state");
  const listEl    = document.getElementById("post-list");
  const prevCount = listEl.querySelectorAll("li").length;

  if (!posts.length) {
    listEl.innerHTML = "";
    stateEl.innerHTML = `<div class="state-msg">— まだ投稿がありません —<br>最初の書き込みをどうぞ</div>`;
    return;
  }
  stateEl.innerHTML = "";

  // 差分更新：件数が増えた場合は末尾に追記（スクロール位置を保持）
  if (onlyNewAnim && posts.length > prevCount) {
    const newPosts = posts.slice(prevCount);
    newPosts.forEach((p, ni) => {
      const li = document.createElement("li");
      li.className = "post-item";
      li.style.animationDelay = `${ni * 40}ms`;
      li.outerHTML; // unused, building via insertAdjacentHTML
      const wrapper = document.createElement("template");
      wrapper.innerHTML = makePostHtml(p, prevCount + ni);
      listEl.appendChild(wrapper.content.firstElementChild);
    });
    // 一番下までスクロール
    listEl.lastElementChild.scrollIntoView({ behavior: "smooth", block: "nearest" });
  } else {
    // 全体再描画（初回 or 件数減少）
    listEl.innerHTML = posts.map((p,i) => makePostHtml(p, i)).join("");
  }
}

// ============================================================
//  書き込み
// ============================================================
// スタンプ送信（単発のみ）
async function sendStamp(stampKey) {
  const nameEl = document.getElementById("post-name");
  const btn    = document.getElementById("submit-post-btn");
  btn.disabled = true;
  try {
    // 返信中ならプレフィックスを付ける
    let content = stampKey;
    if (replyTarget) {
      content = `[[reply:${replyTarget.num}:${replyTarget.name}:${replyTarget.excerpt}]]${stampKey}`;
    }
    const data = await gasPost({
      action:"create_post", thread_id:currentThreadId,
      name: nameEl.value.trim()||"名無しさん", content,
    });
    if (!data.ok) throw new Error(data.error);
    cancelReply();
    lastPostsHash = "";
    showToast(`${STAMP_MAP[stampKey]} 送信しました`,"success");
    await loadPosts();
  } catch(e) {
    showToast(e.message,"error");
  } finally {
    btn.disabled = false;
  }
}

async function submitPost() {
  const nameEl    = document.getElementById("post-name");
  const contentEl = document.getElementById("post-content");
  const btn       = document.getElementById("submit-post-btn");
  let content     = contentEl.value.trim();
  if (!content) { showToast("本文を入力してください","error"); return; }

  // スタンプコードのみの入力は弾く（スタンプボタンから送る）
  if (STAMP_MAP[content]) {
    showToast("スタンプはスタンプボタンから送ってください","error"); return;
  }

  // 返信プレフィックスを付加
  if (replyTarget) {
    content = `[[reply:${replyTarget.num}:${replyTarget.name}:${replyTarget.excerpt}]]${content}`;
  }

  btn.disabled = true; btn.textContent = "送信中…";
  try {
    const data = await gasPost({
      action:"create_post", thread_id:currentThreadId,
      name: nameEl.value.trim()||"名無しさん", content,
    });
    if (!data.ok) throw new Error(data.error);
    contentEl.value = "";
    cancelReply();
    lastPostsHash = "";
    showToast("書き込みました","success");
    await loadPosts();
  } catch(e) {
    showToast(e.message,"error");
  } finally {
    btn.disabled = false; btn.textContent = "書き込む →";
  }
}

// ============================================================
//  ブラウザ戻るボタン
// ============================================================
window.addEventListener("popstate", () => {
  if (!isAuthenticated()) return;
  const tid = new URLSearchParams(location.search).get("thread_id");
  if (tid) openThread({ id:tid, title:"読み込み中…", created_at:"" });
  else     showView("threads");
});

// タブが非表示のときはポーリング停止、復帰時に再開
document.addEventListener("visibilitychange", () => {
  if (document.hidden) {
    stopPolling();
  } else {
    if (!isAuthenticated()) return;
    if (currentThreadId) startPollingPosts();
    else                  startPollingThreads();
  }
});

// ============================================================
//  起動：認証チェック
// ============================================================
if (isAuthenticated()) {
  document.getElementById("passcode-overlay").classList.add("hidden");
  initRoute();
}
// 未認証の場合はオーバーレイが表示されたままで、
// 正解入力後に initRoute() が呼ばれる
</script>
</body>
