<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat_Haiku</title>
<style>
/* ===== Google Fonts ===== */
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap');

/* ===== Reset ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:       #e8e4dc;
  --ink-sub:   #a09890;
  --ink-faint: rgba(232,228,220,.12);
  --gold:      #c9a96e;
  --gold-dim:  rgba(201,169,110,.18);
  --red:       #c0392b;
  --glass-bg:  rgba(12,10,8,.55);
  --glass-border: rgba(201,169,110,.22);
  --blur:      blur(18px) saturate(160%);
  --radius:    14px;
  --font-serif: 'Noto Serif JP', serif;
  --font-mono:  'JetBrains Mono', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-serif);
  color: var(--ink);
  min-height: 100vh;
  background: #0a0806 url('back.png') center/cover fixed no-repeat;
  overflow-x: hidden;
}

/* ===== 背景オーバーレイ ===== */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: linear-gradient(
    160deg,
    rgba(8,6,4,.72) 0%,
    rgba(14,10,6,.58) 50%,
    rgba(6,4,2,.78) 100%
  );
  pointer-events: none;
  z-index: 0;
}

/* ===== Header ===== */
header {
  position: sticky; top: 0; z-index: 200;
  background: rgba(8,6,4,.72);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--glass-border);
  height: 60px;
  display: flex; align-items: center;
  padding: 0 1.5rem; gap: 1rem;
}

.site-logo {
  font-family: var(--font-mono);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--gold);
  letter-spacing: .04em;
  cursor: pointer;
  user-select: none;
  flex: 1;
}
.site-logo span { color: var(--ink-sub); font-weight: 400; }

#back-btn {
  display: none;
  align-items: center; gap: .4rem;
  background: var(--gold-dim);
  border: 1px solid var(--glass-border);
  color: var(--gold);
  padding: .35rem .85rem;
  border-radius: 20px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: .78rem;
  letter-spacing: .05em;
  transition: background .2s, border-color .2s;
}
#back-btn:hover { background: rgba(201,169,110,.3); border-color: var(--gold); }
#back-btn.visible { display: flex; }

/* 装飾線 */
.header-kigo {
  font-size: .7rem;
  color: var(--ink-sub);
  letter-spacing: .12em;
  font-family: var(--font-mono);
  opacity: .6;
}

/* ===== Main layout ===== */
main {
  position: relative; z-index: 1;
  max-width: 740px;
  margin: 0 auto;
  padding: 2rem 1rem 6rem;
}

/* ===== Glass card ===== */
.card {
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem;
  margin-bottom: 1rem;
}

.card-eyebrow {
  font-family: var(--font-mono);
  font-size: .68rem;
  color: var(--gold);
  letter-spacing: .14em;
  text-transform: uppercase;
  margin-bottom: 1rem;
  display: flex; align-items: center; gap: .5rem;
}
.card-eyebrow::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, var(--glass-border), transparent);
}

/* ===== Form elements ===== */
.form-group { margin-bottom: .9rem; }

label {
  display: block;
  font-size: .72rem;
  color: var(--ink-sub);
  letter-spacing: .08em;
  margin-bottom: .4rem;
  font-family: var(--font-mono);
}

input[type="text"], textarea {
  width: 100%;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(201,169,110,.2);
  border-radius: 8px;
  padding: .65rem .9rem;
  font-size: .9rem;
  font-family: var(--font-serif);
  color: var(--ink);
  transition: border-color .2s, background .2s;
  outline: none;
}
input[type="text"]::placeholder,
textarea::placeholder { color: rgba(160,152,144,.5); }
input[type="text"]:focus, textarea:focus {
  border-color: var(--gold);
  background: rgba(201,169,110,.06);
}
textarea { resize: vertical; min-height: 90px; line-height: 1.7; }

/* ===== Buttons ===== */
.btn {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: .6rem 1.3rem;
  border: none; border-radius: 8px;
  cursor: pointer;
  font-family: var(--font-mono);
  font-size: .82rem;
  font-weight: 600;
  letter-spacing: .05em;
  transition: opacity .2s, transform .1s, box-shadow .2s;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .4; cursor: not-allowed; }

.btn-gold {
  background: linear-gradient(135deg, #c9a96e 0%, #a07840 100%);
  color: #0a0806;
  box-shadow: 0 2px 16px rgba(201,169,110,.25);
}
.btn-gold:hover:not(:disabled) { box-shadow: 0 4px 24px rgba(201,169,110,.4); }

.btn-ghost {
  background: var(--gold-dim);
  border: 1px solid var(--glass-border);
  color: var(--gold);
}
.btn-ghost:hover:not(:disabled) { background: rgba(201,169,110,.28); }

/* ===== Thread list ===== */
#thread-list { list-style: none; display: flex; flex-direction: column; gap: .55rem; }

.thread-item {
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color .2s, transform .15s, box-shadow .2s;
  cursor: pointer;
}
.thread-item:hover {
  border-color: rgba(201,169,110,.5);
  transform: translateX(4px);
  box-shadow: -4px 0 20px rgba(201,169,110,.12);
}

.thread-link {
  display: flex; align-items: center; gap: 1rem;
  padding: 1rem 1.2rem;
}

.thread-num {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--gold);
  opacity: .6;
  min-width: 2em;
  text-align: right;
}
.thread-body { flex: 1; min-width: 0; }
.thread-title {
  font-size: .95rem;
  font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-bottom: 3px;
}
.thread-date {
  font-family: var(--font-mono);
  font-size: .68rem;
  color: var(--ink-sub);
}
.thread-arrow {
  color: var(--gold);
  opacity: .5;
  font-size: 1.1rem;
  transition: opacity .2s, transform .2s;
}
.thread-item:hover .thread-arrow { opacity: 1; transform: translateX(3px); }

/* ===== Thread header in post view ===== */
#thread-header-card {
  border-left: 3px solid var(--gold);
  padding-left: 1.4rem;
}
#thread-header-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: .3rem;
  line-height: 1.5;
}
#thread-header-date {
  font-family: var(--font-mono);
  font-size: .7rem;
  color: var(--ink-sub);
}

/* ===== Post list ===== */
#post-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; }

.post-item {
  background: var(--glass-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  animation: fadeUp .3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.post-header {
  display: flex; align-items: baseline; gap: .6rem;
  margin-bottom: .6rem; flex-wrap: wrap;
}
.post-num {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--gold);
  opacity: .7;
  min-width: 2.2em;
}
.post-name {
  font-family: var(--font-mono);
  font-size: .8rem;
  font-weight: 600;
  color: var(--gold);
}
.post-time {
  font-family: var(--font-mono);
  font-size: .65rem;
  color: var(--ink-sub);
  margin-left: auto;
}
.post-body {
  font-size: .92rem;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: break-word;
  color: var(--ink);
}

/* ===== State messages ===== */
.state-msg {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--ink-sub);
  font-size: .85rem;
  font-family: var(--font-mono);
  letter-spacing: .06em;
}

/* ===== Spinner ===== */
.spinner {
  display: inline-block;
  width: 22px; height: 22px;
  border: 2px solid rgba(201,169,110,.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle;
  margin-right: .5rem;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 2rem; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: rgba(14,10,6,.92);
  border: 1px solid var(--glass-border);
  backdrop-filter: var(--blur);
  color: var(--ink);
  padding: .65rem 1.4rem;
  border-radius: 24px;
  font-family: var(--font-mono);
  font-size: .78rem;
  letter-spacing: .06em;
  opacity: 0;
  transition: opacity .3s, transform .3s;
  pointer-events: none;
  z-index: 999;
  max-width: 90vw;
  text-align: center;
}
.toast.show     { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error    { border-color: rgba(192,57,43,.5); color: #e87070; }
.toast.success  { border-color: rgba(201,169,110,.5); color: var(--gold); }

/* ===== Divider ===== */
.divider {
  display: flex; align-items: center; gap: .8rem;
  margin: 1.2rem 0;
  font-family: var(--font-mono);
  font-size: .62rem;
  color: var(--ink-sub);
  letter-spacing: .1em;
  opacity: .5;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--glass-border);
}

/* ===== Mobile ===== */
@media (max-width: 480px) {
  main { padding: 1.2rem .6rem 5rem; }
  .card { padding: 1.1rem 1rem; }
  header { padding: 0 1rem; }
  #thread-header-title { font-size: .98rem; }
}
</style>
</head>
<body>

<header>
  <button id="back-btn" onclick="showView('threads')">← INDEX</button>
  <div class="site-logo" onclick="showView('threads')">Chat_Haiku<span> //</span></div>
  <div class="header-kigo">一期一会</div>
</header>

<main>
  <!-- ========== スレッド一覧ビュー ========== -->
  <div id="view-threads">
    <div class="card">
      <div class="card-eyebrow">NEW THREAD</div>
      <div class="form-group">
        <label>TITLE</label>
        <input type="text" id="new-thread-title" placeholder="スレッドのタイトルを入力…" maxlength="100">
      </div>
      <button class="btn btn-gold" id="create-thread-btn" onclick="createThread()">
        ＋ スレッドを立てる
      </button>
    </div>

    <div class="divider">THREADS</div>
    <div id="thread-list-state"></div>
    <ul id="thread-list"></ul>
  </div>

  <!-- ========== スレッド内ビュー ========== -->
  <div id="view-posts" style="display:none">
    <div class="card" id="thread-header-card">
      <div id="thread-header-title"></div>
      <div id="thread-header-date"></div>
    </div>

    <div class="divider">POSTS</div>
    <div id="post-list-state"></div>
    <ul id="post-list"></ul>

    <div class="card" style="margin-top:1.2rem">
      <div class="card-eyebrow">WRITE</div>
      <div class="form-group">
        <label>NAME（省略可）</label>
        <input type="text" id="post-name" placeholder="名無しさん" maxlength="50">
      </div>
      <div class="form-group">
        <label>MESSAGE</label>
        <textarea id="post-content" placeholder="ここに書き込む…" maxlength="2000"></textarea>
      </div>
      <button class="btn btn-gold" id="submit-post-btn" onclick="submitPost()">
        書き込む →
      </button>
    </div>
  </div>
</main>

<div id="toast" class="toast"></div>

<script>
// ============================================================
//  設定
// ============================================================
const GAS_URL = "YOUR_GAS_URL"; // ← GASのWebアプリURLに書き換えてください

// ============================================================
//  状態
// ============================================================
let currentThreadId   = null;
let currentThreadData = null;

// ============================================================
//  XSSエスケープ
// ============================================================
function esc(str) {
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ============================================================
//  Toast
// ============================================================
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = `toast show ${type}`;
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.className = "toast"; }, 3000);
}

// ============================================================
//  ビュー切り替え
// ============================================================
function showView(view) {
  document.getElementById("view-threads").style.display = view === "threads" ? "" : "none";
  document.getElementById("view-posts").style.display   = view === "posts"   ? "" : "none";
  const backBtn = document.getElementById("back-btn");
  if (view === "posts") backBtn.classList.add("visible");
  else                  backBtn.classList.remove("visible");

  if (view === "threads") {
    currentThreadId = null;
    history.pushState({}, "", location.pathname);
    loadThreads();
  }
}

// ============================================================
//  初期ルーティング
// ============================================================
function initRoute() {
  const params = new URLSearchParams(location.search);
  const tid    = params.get("thread_id");
  if (tid) openThread({ id: tid, title: "読み込み中…", created_at: "" });
  else      loadThreads();
}

// ============================================================
//  GAS通信
// ============================================================
async function gasGet(params) {
  const url = new URL(GAS_URL);
  Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
  const res = await fetch(url.toString(), { redirect: "follow" });
  return res.json();
}

async function gasPost(body) {
  const res = await fetch(GAS_URL, {
    method:   "POST",
    redirect: "follow",
    headers:  { "Content-Type": "text/plain" },
    body:     JSON.stringify(body),
  });
  return res.json();
}

// ============================================================
//  スレッド一覧
// ============================================================
async function loadThreads() {
  const stateEl = document.getElementById("thread-list-state");
  const listEl  = document.getElementById("thread-list");
  listEl.innerHTML = "";
  stateEl.innerHTML = `<div class="state-msg"><span class="spinner"></span>loading…</div>`;

  try {
    const data = await gasGet({});
    stateEl.innerHTML = "";
    if (!data.ok) throw new Error(data.error);

    const threads = data.threads || [];
    if (threads.length === 0) {
      stateEl.innerHTML = `<div class="state-msg">— スレッドがまだありません —<br>最初のスレッドを立てましょう</div>`;
      return;
    }

    listEl.innerHTML = threads.map((t, i) => `
      <li class="thread-item" onclick='openThread(${JSON.stringify(t).replace(/'/g,"\\'")})'> 
        <div class="thread-link">
          <div class="thread-num">${String(i + 1).padStart(2, "0")}</div>
          <div class="thread-body">
            <div class="thread-title">${esc(t.title)}</div>
            <div class="thread-date">${esc(t.created_at)}</div>
          </div>
          <div class="thread-arrow">›</div>
        </div>
      </li>
    `).join("");
  } catch (e) {
    stateEl.innerHTML = `<div class="state-msg">⚠ ${esc(e.message)}</div>`;
  }
}

// ============================================================
//  スレッド作成
// ============================================================
async function createThread() {
  const titleEl = document.getElementById("new-thread-title");
  const btn     = document.getElementById("create-thread-btn");
  const title   = titleEl.value.trim();
  if (!title) { showToast("タイトルを入力してください", "error"); return; }

  btn.disabled = true;
  btn.textContent = "作成中…";
  try {
    const data = await gasPost({ action: "create_thread", title });
    if (!data.ok) throw new Error(data.error);
    titleEl.value = "";
    showToast("スレッドを作成しました", "success");
    loadThreads();
  } catch (e) {
    showToast(e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "＋ スレッドを立てる";
  }
}

// ============================================================
//  スレッドを開く
// ============================================================
function openThread(thread) {
  currentThreadId   = thread.id;
  currentThreadData = thread;
  document.getElementById("thread-header-title").textContent = thread.title;
  document.getElementById("thread-header-date").textContent  =
    thread.created_at ? `作成日時：${thread.created_at}` : "";
  history.pushState({}, "", `?thread_id=${encodeURIComponent(thread.id)}`);
  showView("posts");
  loadPosts();
}

// ============================================================
//  投稿一覧
// ============================================================
async function loadPosts() {
  const stateEl = document.getElementById("post-list-state");
  const listEl  = document.getElementById("post-list");
  listEl.innerHTML = "";
  stateEl.innerHTML = `<div class="state-msg"><span class="spinner"></span>loading…</div>`;

  try {
    const data = await gasGet({ action: "get_posts", thread_id: currentThreadId });
    stateEl.innerHTML = "";
    if (!data.ok) throw new Error(data.error);

    const posts = data.posts || [];
    if (posts.length === 0) {
      stateEl.innerHTML = `<div class="state-msg">— まだ投稿がありません —<br>最初の書き込みをどうぞ</div>`;
      return;
    }

    listEl.innerHTML = posts.map((p, i) => `
      <li class="post-item" style="animation-delay:${i * 40}ms">
        <div class="post-header">
          <span class="post-num">${String(i + 1).padStart(2, "0")}</span>
          <span class="post-name">${esc(p.name || "名無しさん")}</span>
          <span class="post-time">${esc(p.timestamp)}</span>
        </div>
        <div class="post-body">${esc(p.content)}</div>
      </li>
    `).join("");
  } catch (e) {
    stateEl.innerHTML = `<div class="state-msg">⚠ ${esc(e.message)}</div>`;
  }
}

// ============================================================
//  書き込み
// ============================================================
async function submitPost() {
  const nameEl    = document.getElementById("post-name");
  const contentEl = document.getElementById("post-content");
  const btn       = document.getElementById("submit-post-btn");
  const content   = contentEl.value.trim();
  if (!content) { showToast("本文を入力してください", "error"); return; }

  btn.disabled = true;
  btn.textContent = "送信中…";
  try {
    const data = await gasPost({
      action:    "create_post",
      thread_id: currentThreadId,
      name:      nameEl.value.trim() || "名無しさん",
      content,
    });
    if (!data.ok) throw new Error(data.error);
    contentEl.value = "";
    showToast("書き込みました", "success");
    loadPosts();
  } catch (e) {
    showToast(e.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "書き込む →";
  }
}

// ============================================================
//  ブラウザ戻るボタン対応
// ============================================================
window.addEventListener("popstate", () => {
  const tid = new URLSearchParams(location.search).get("thread_id");
  if (tid) openThread({ id: tid, title: "読み込み中…", created_at: "" });
  else      showView("threads");
});

// ============================================================
//  初期化
// ============================================================
initRoute();
</script>
</body>
</html>
